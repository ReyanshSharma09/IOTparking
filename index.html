<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkSmart Pro | Intelligent Parking System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --tech-black: #0a0e1a;
            --tech-dark: #0f1419;
            --tech-card: #141b26;
            --tech-elevated: #1a2332;
            
            --primary: #00d9ff;
            --primary-glow: rgba(0, 217, 255, 0.5);
            
            --accent: #7c3aed;
            --accent-glow: rgba(124, 58, 237, 0.5);
            
            --success: #00ff88;
            --warning: #ffa500;
            --danger: #ff3366;
            
            --text-primary: #ffffff;
            --text-secondary: #c7d5e0;
            --text-muted: #8a9bb0;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--tech-black);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* High-Tech Background */
        .tech-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        /* Hexagon Grid */
        .hexagon-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 217, 255, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 25% 75%, rgba(124, 58, 237, 0.03) 1px, transparent 1px);
            background-size: 50px 50px, 80px 80px;
            animation: hexMove 30s linear infinite;
        }

        @keyframes hexMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Glowing Orbs */
        .tech-orbs {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .tech-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: orbFloat 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--primary), transparent);
            top: 10%;
            right: 10%;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent), transparent);
            bottom: 10%;
            left: 10%;
            animation-delay: 5s;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--success), transparent);
            top: 50%;
            left: 50%;
            animation-delay: 10s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(100px, -100px) scale(1.1); }
            66% { transform: translate(-100px, 100px) scale(0.9); }
        }

        /* Circuit Lines */
        .circuit-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.1;
        }

        .circuit-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            height: 1px;
            width: 100%;
            animation: circuitFlow 8s linear infinite;
        }

        .circuit-line:nth-child(1) { top: 20%; animation-delay: 0s; }
        .circuit-line:nth-child(2) { top: 40%; animation-delay: 2s; }
        .circuit-line:nth-child(3) { top: 60%; animation-delay: 4s; }
        .circuit-line:nth-child(4) { top: 80%; animation-delay: 6s; }

        @keyframes circuitFlow {
            0% { transform: translateX(-100%); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(100%); opacity: 0; }
        }

        /* Floating Particles */
        .tech-particles {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary-glow);
            animation: particleFloat linear infinite;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) translateX(0) scale(0);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-100px) translateX(100px) scale(1);
                opacity: 0;
            }
        }

        /* Content Layer */
        .content-wrapper {
            position: relative;
            z-index: 1;
        }

        /* Header */
        .tech-header {
            background: linear-gradient(180deg, rgba(20, 27, 38, 0.98) 0%, rgba(20, 27, 38, 0.85) 100%);
            backdrop-filter: blur(40px);
            border-bottom: 1px solid rgba(0, 217, 255, 0.2);
            padding: 1.5rem 0;
            position: sticky;
            top: 0;
            z-index: 1001;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
        }

        .tech-header .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            text-decoration: none;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 15px 50px var(--primary-glow);
            position: relative;
            overflow: hidden;
        }

        .logo-icon::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: logoShine 3s linear infinite;
        }

        @keyframes logoShine {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-brand {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .logo-tagline {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 300;
        }

        .header-status {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1.5rem;
            background: rgba(0, 217, 255, 0.08);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 50px;
            transition: all 0.4s ease;
        }

        .status-item:hover {
            background: rgba(0, 217, 255, 0.15);
            transform: translateY(-3px);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--success);
            animation: statusPulse 2s ease infinite;
        }

        @keyframes statusPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }

        .system-time {
            font-family: 'Space Mono', monospace;
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--primary);
            text-shadow: 0 0 30px var(--primary-glow);
            letter-spacing: 3px;
        }

        /* Navigation */
        nav {
            background: linear-gradient(180deg, rgba(26, 35, 50, 0.95) 0%, rgba(26, 35, 50, 0.8) 100%);
            backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(0, 217, 255, 0.15);
            padding: 1.5rem 0;
            position: sticky;
            top: 110px;
            z-index: 1000;
        }

        nav .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 3rem;
            display: flex;
            justify-content: center;
            gap: 5rem;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.4s ease;
            position: relative;
            padding: 0.75rem 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        nav a::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 3px;
            background: var(--primary);
            transition: all 0.4s ease;
            transform: translateX(-50%);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        nav a:hover::before,
        nav a.active::before {
            width: 100%;
        }

        nav a:hover,
        nav a.active {
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary-glow);
        }

        /* Main Container - CENTERED */
        .main-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
        }

        .hero-section {
            max-width: 1400px;
            width: 100%;
            text-align: center;
            margin-bottom: 4rem;
        }

        .hero-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            font-weight: 900;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
        }

        .hero-subtitle {
            font-size: 1.5rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Reserve Interface - CENTERED */
        .reserve-interface {
            max-width: 900px;
            width: 100%;
            background: linear-gradient(135deg, rgba(20, 27, 38, 0.95), rgba(26, 35, 50, 0.9));
            backdrop-filter: blur(40px);
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-radius: 30px;
            padding: 3.5rem;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7);
            position: relative;
            overflow: hidden;
            margin: 0 auto;
        }

        .reserve-interface::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 217, 255, 0.2), transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
        }

        .interface-header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid rgba(0, 217, 255, 0.2);
            position: relative;
            z-index: 1;
        }

        .interface-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .interface-status {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: rgba(0, 255, 136, 0.15);
            border: 2px solid var(--success);
            border-radius: 50px;
            font-size: 0.9rem;
            color: var(--success);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 1rem;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }

        /* Form */
        .reserve-form {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            position: relative;
            z-index: 1;
        }

        .form-group {
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            color: var(--primary);
            margin-bottom: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-family: 'Orbitron', sans-serif;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 1.5rem 1.75rem;
            background: rgba(10, 14, 26, 0.7);
            border: 2px solid rgba(0, 217, 255, 0.2);
            border-radius: 15px;
            color: var(--text-primary);
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.4s ease;
            font-family: 'Rajdhani', sans-serif;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 40px var(--primary-glow);
            background: rgba(10, 14, 26, 0.95);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        /* Tier Info */
        .tier-info {
            background: rgba(0, 217, 255, 0.05);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 15px;
            padding: 2rem;
            margin-top: 1rem;
            display: none;
        }

        .tier-info.active {
            display: block;
            animation: expandIn 0.5s ease;
        }

        @keyframes expandIn {
            from {
                opacity: 0;
                transform: scaleY(0.8);
            }
            to {
                opacity: 1;
                transform: scaleY(1);
            }
        }

        .tier-features {
            display: grid;
            gap: 1.25rem;
        }

        .tier-feature {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .tier-feature i {
            color: var(--primary);
            font-size: 1.25rem;
        }

        /* Buttons */
        .tech-btn {
            padding: 1.75rem 3.5rem;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.5s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 1.25rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-family: 'Orbitron', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .tech-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.8s, height 0.8s;
        }

        .tech-btn:active::before {
            width: 400px;
            height: 400px;
        }

        .tech-btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            box-shadow: 0 15px 50px var(--primary-glow);
        }

        .tech-btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 70px var(--primary-glow);
        }

        .tech-btn-secondary {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .tech-btn-secondary:hover {
            background: rgba(0, 217, 255, 0.15);
            transform: translateY(-3px);
        }

        /* Results Section */
        .results-section {
            display: none;
            margin-top: 3rem;
            animation: fadeInUp 0.6s ease;
        }

        .results-section.active {
            display: block;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .results-header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid rgba(0, 217, 255, 0.2);
        }

        .results-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--primary);
        }

        /* Location Cards */
        .locations-grid {
            display: grid;
            gap: 2rem;
        }

        .location-card {
            background: linear-gradient(135deg, rgba(20, 27, 38, 0.7), rgba(26, 35, 50, 0.5));
            backdrop-filter: blur(30px);
            border: 2px solid rgba(0, 217, 255, 0.2);
            border-radius: 20px;
            padding: 2.5rem;
            cursor: pointer;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .location-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 217, 255, 0.15), transparent);
            transition: left 0.8s ease;
        }

        .location-card:hover::before {
            left: 100%;
        }

        .location-card:hover {
            transform: translateX(15px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 30px 80px rgba(0, 217, 255, 0.3);
        }

        .location-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
        }

        .location-address {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .location-info {
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .info-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .info-badge i {
            color: var(--primary);
        }

        /* Modal */
        .tech-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            overflow-y: auto;
        }

        .tech-modal.active {
            display: flex;
        }

        .modal-container {
            background: linear-gradient(135deg, var(--tech-card), var(--tech-elevated));
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-radius: 30px;
            padding: 4rem;
            max-width: 1500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.9);
            animation: modalZoom 0.5s ease;
        }

        @keyframes modalZoom {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-close {
            position: absolute;
            top: 2.5rem;
            right: 2.5rem;
            width: 60px;
            height: 60px;
            border-radius: 15px;
            background: rgba(255, 51, 102, 0.15);
            border: 2px solid var(--danger);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s ease;
            color: var(--danger);
            font-size: 2rem;
        }

        .modal-close:hover {
            background: var(--danger);
            color: white;
            transform: rotate(90deg);
        }

        .modal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2rem;
        }

        /* Tier Filter */
        .tier-filter {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-bottom: 3rem;
            padding: 2.5rem;
            background: rgba(10, 14, 26, 0.5);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 20px;
        }

        .tier-filter-btn {
            padding: 1.5rem;
            border: 2px solid rgba(0, 217, 255, 0.3);
            background: transparent;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.4s ease;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            font-family: 'Orbitron', sans-serif;
        }

        .tier-filter-btn:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .tier-filter-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-color: var(--primary);
            color: white;
            box-shadow: 0 15px 50px var(--primary-glow);
        }

        /* Floor Cards */
        .floors-grid {
            display: grid;
            gap: 3rem;
        }

        .floor-card {
            background: rgba(20, 27, 38, 0.5);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 20px;
            padding: 2.5rem;
        }

        .floor-header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid rgba(0, 217, 255, 0.2);
        }

        .floor-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--primary);
        }

        /* Parking Spots */
        .spots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 85px);
            gap: 18px;
            justify-content: center;
            margin-bottom: 2.5rem;
        }

        .parking-spot {
            width: 85px;
            height: 85px;
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            transition: all 0.4s ease;
            background: rgba(10, 14, 26, 0.5);
        }

        .parking-spot.available {
            background: rgba(0, 255, 136, 0.15);
            border-color: var(--success);
            color: var(--success);
        }

        .parking-spot.available:hover {
            background: var(--success);
            color: var(--tech-black);
            transform: scale(1.25);
            box-shadow: 0 15px 50px rgba(0, 255, 136, 0.5);
            z-index: 10;
        }

        .parking-spot.occupied {
            background: rgba(255, 51, 102, 0.15);
            border-color: var(--danger);
            color: var(--danger);

            height: 16px;

            to {

        .timer-panel.danger {

            animation: dangerShake 0.5s ease infinite;

        @keyframes dangerShake {

            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }

            animation: timerPulse 1s infinite;
        }

        @keyframes timerPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.08); }
        }

        .timer-progress {

            border-radius: 15px;

        }
