<script>
    const tierConfig = {
        standard: {
            minutes: 60,
            price: 650,
            label: "Standard",
            note: "Any available floor • base spot • no priority allocation"
        },
        priority: {
            minutes: 75,
            price: 1200,
            label: "Priority",
            note: "Preferred floors • closer to lift/exit • faster allocation"
        },
        vip: {
            minutes: 90,
            price: 2000,
            label: "VIP Ultra",
            note: "Closest to entrance • premium zone • highest priority"
        }
    };

    const tierPremium = {
        standard: 0,
        priority: 500,
        vip: 1200
    };

    let currentTier = "standard";
    let activeReservation = null;
    let reservationTimer = null;
    let timeRemaining = 0;
    let totalTime = 0;
    let lastSearchLocation = "";
    let selectedParkingData = null;

    document.addEventListener("DOMContentLoaded", function () {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById("dateTime").value = now.toISOString().slice(0, 16);
        renderTierHint();
        updateActiveReservationPanel();
    });

    document.getElementById("tierSelect").addEventListener("change", function () {
        currentTier = this.value;
        renderTierHint();
    });

    function renderTierHint() {
        const hint = document.getElementById("tierHint");
        if (hint) {
            hint.textContent = `${tierConfig[currentTier].label}: ${tierConfig[currentTier].note}`;
        }
    }

    function searchParking() {
        const location = document.getElementById("locationInput").value.trim();
        if (!location) {
            alert("Please enter a destination");
            return;
        }

        lastSearchLocation = location;
        displayParkingLocations();
        document.getElementById("parkingResults").classList.add("active");
        document.getElementById("parkingResults").scrollIntoView({ behavior: "smooth" });

        if (activeReservation) {
            updateActiveReservationPanel();
        }
    }

    function displayParkingLocations() {
        const container = document.getElementById("parkingLocations");
        container.innerHTML = "";

        parkingData.forEach(parking => {
            const availabilityPercent = (parking.availableSpots / parking.totalSpots) * 100;
            let statusClass = "status-available";
            let statusText = "✓ Available";

            if (availabilityPercent < 20 && availabilityPercent > 0) {
                statusClass = "status-filling";
                statusText = "⚡ Filling Fast";
            }
            if (availabilityPercent === 0) {
                statusClass = "status-full";
                statusText = "❌ Full";
            }

            const card = document.createElement("div");
            card.className = "parking-location-card";
            card.onclick = () => showFloorDetails(parking);

            card.innerHTML = `
                <div class="floors-indicator">🏢 ${parking.floors.length} Floor${parking.floors.length > 1 ? "s" : ""}</div>
                <div class="location-header">
                    <div>
                        <div class="location-name">${parking.name}</div>
                        <div style="color: var(--text-muted); font-size: 0.85rem;">${parking.address}</div>
                    </div>
                    <div class="location-status ${statusClass}">${statusText}</div>
                </div>
                <div class="location-details">
                    <div class="detail-item"><span>📍</span> ${parking.distance} away</div>
                    <div class="detail-item"><span>🚶</span> ${parking.walkTime} walk</div>
                    <div class="detail-item"><span>⭐</span> ${parking.rating} rating</div>
                    <div class="detail-item"><span>💰</span> ₹${parking.price} base</div>
                </div>
                <div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-top:0.75rem;">
                    ${parking.features.map(f => `<span style="background: var(--bg-card); border: 1px solid var(--border); padding: 0.3rem 0.75rem; border-radius: 15px; font-size: 0.8rem; color: var(--text-secondary);">${f}</span>`).join("")}
                </div>
                <div style="margin-top:0.75rem; color: var(--warning); font-size:0.85rem;">
                    ${tierConfig[currentTier].note}
                </div>
                <div class="location-stats">
                    <div class="stat-item">
                        <span class="stat-item-label">Available</span>
                        <span class="stat-item-value">${parking.availableSpots}/${parking.totalSpots}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-item-label">Occupancy</span>
                        <span class="stat-item-value">${Math.round((1 - parking.availableSpots / parking.totalSpots) * 100)}%</span>
                    </div>
                </div>
                <div style="margin-top:1rem; padding-top:1rem; border-top:1px solid var(--border); color: var(--text-muted); font-size:0.85rem; text-align:center;">
                    👆 Click to view floor-wise availability
                </div>
            `;
            container.appendChild(card);
        });
    }

    function floorRank(name) {
        const orderVip = ["Ground Floor", "Level 1", "Basement 1", "First Floor", "Level 2", "Level 3", "Rooftop", "Second Floor", "Basement 2"];
        const orderPriority = ["Ground Floor", "Level 1", "First Floor", "Basement 1", "Level 2", "Level 3", "Rooftop", "Second Floor", "Basement 2"];

        if (currentTier === "vip") {
            const idx = orderVip.indexOf(name);
            return idx === -1 ? 999 : idx;
        }

        if (currentTier === "priority") {
            const idx = orderPriority.indexOf(name);
            return idx === -1 ? 999 : idx;
        }

        return 0;
    }

    function showFloorDetails(parking) {
        selectedParkingData = parking;
        document.getElementById("modalLocationName").textContent = parking.name;
        document.getElementById("modalLocationAddress").textContent = parking.address;
        document.getElementById("modalTierHint").textContent = `${tierConfig[currentTier].label}: ${tierConfig[currentTier].note}`;

        const floorsContainer = document.getElementById("floorsContainer");
        floorsContainer.innerHTML = "";

        const sortedFloors = [...parking.floors].sort((a, b) => floorRank(a.name) - floorRank(b.name));

        sortedFloors.forEach((floor, index) => {
            const availabilityPercent = (floor.available / floor.total) * 100;
            let availabilityClass = "high";
            if (availabilityPercent < 30) availabilityClass = "medium";
            if (availabilityPercent < 15) availabilityClass = "low";

            const recommended =
                (currentTier === "vip" && index === 0) ||
                (currentTier === "priority" && index < 2);

            const floorCard = document.createElement("div");
            floorCard.className = "floor-card";

            floorCard.innerHTML = `
                <div class="floor-header">
                    <div class="floor-name">
                        ${floor.name}
                        ${recommended ? `<span style="color: var(--primary); font-size: 0.85rem; margin-left: 0.5rem;">• Recommended for ${tierConfig[currentTier].label}</span>` : ""}
                    </div>
                    <div class="floor-availability ${availabilityClass}">${floor.available}/${floor.total} Available</div>
                </div>

                <div class="floor-info">
                    <div class="floor-info-item">
                        <div class="floor-info-label">Available</div>
                        <div class="floor-info-value" style="color: var(--primary);">${floor.available}</div>
                    </div>
                    <div class="floor-info-item">
                        <div class="floor-info-label">Occupied</div>
                        <div class="floor-info-value" style="color: var(--danger);">${floor.occupied}</div>
                    </div>
                    <div class="floor-info-item">
                        <div class="floor-info-label">Reserved</div>
                        <div class="floor-info-value" style="color: var(--warning);">${floor.reserved}</div>
                    </div>
                </div>

                <div style="margin-bottom: 1rem; color: var(--text-secondary); font-size: 0.9rem;">
                    ${currentTier === "standard"
                        ? "Standard: any available spot on this floor"
                        : currentTier === "priority"
                        ? "Priority: preferred floor placement"
                        : "VIP: premium placement closest to entrance"}
                </div>

                <div class="parking-spots-grid">
                    ${floor.spots.map(spot => `
                        <div class="parking-spot ${spot.status}"
                            ${spot.status === "available"
                                ? `onclick="selectSpot(${JSON.stringify(parking.name)}, ${JSON.stringify(floor.name)}, ${JSON.stringify(spot.number)}, ${parking.price})"`
                                : ""}>
                            <div class="spot-icon">
                                ${spot.status === "available" ? "🅿️" : spot.status === "occupied" ? "🚗" : "⏱️"}
                            </div>
                            <div>${spot.number}</div>
                        </div>
                    `).join("")}
                </div>

                <div class="floor-legend">
                    <div class="legend-item">
                        <div class="legend-box available"></div>
                        <span>Available (${floor.available})</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-box occupied"></div>
                        <span>Occupied (${floor.occupied})</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-box reserved"></div>
                        <span>Reserved (${floor.reserved})</span>
                    </div>
                </div>
            `;

            floorsContainer.appendChild(floorCard);
        });

        openModal("floorModal");
    }

    function selectSpot(locationName, floorName, spotNumber, basePrice) {
        if (activeReservation) {
            alert(`You already have 1 active reservation at ${activeReservation.locationName}. Use Rebook or Cancel first.`);
            return;
        }

        const totalFee = basePrice + tierPremium[currentTier];

        if (!confirm(
            `Reserve ${spotNumber} at ${floorName}, ${locationName}?\n\n` +
            `Tier: ${tierConfig[currentTier].label}\n` +
            `Fee: ₹${totalFee}\n\n` +
            `Only one active reservation is allowed at a time.`
        )) {
            return;
        }

        activateReservation(locationName, floorName, spotNumber, totalFee);
    }

    function activateReservation(locationName, floorName, spotNumber, fee) {
        activeReservation = {
            locationName,
            floorName,
            spotNumber,
            fee,
            tier: currentTier
        };

        document.getElementById("selectedLocation").textContent = locationName;
        document.getElementById("selectedFloor").textContent = floorName;
        document.getElementById("selectedSpot").textContent = spotNumber;
        document.getElementById("reservationFee").textContent = fee;

        updateActiveReservationPanel();

        closeModal("floorModal");
        document.getElementById("parkingResults").classList.remove("active");
        document.getElementById("successMessage").classList.remove("active");
        document.getElementById("timerDisplay").classList.add("active");
        document.getElementById("timerDisplay").scrollIntoView({ behavior: "smooth" });

        startTimer(tierConfig[currentTier].minutes * 60);
    }

    function updateActiveReservationPanel() {
        const panel = document.getElementById("activeReservationPanel");
        const text = document.getElementById("activeReservationText");

        if (activeReservation) {
            panel.style.display = "block";
            text.innerHTML = `
                You have <strong>1 active reservation</strong> only.<br>
                <strong>${activeReservation.locationName}</strong> • ${activeReservation.floorName} • ${activeReservation.spotNumber}<br>
                Tier: ${tierConfig[activeReservation.tier].label} • Fee: ₹${activeReservation.fee}
            `;
        } else {
            panel.style.display = "none";
            text.innerHTML = "";
        }
    }

    function startTimer(seconds) {
        clearInterval(reservationTimer);

        timeRemaining = seconds;
        totalTime = seconds;

        const countdownEl = document.getElementById("countdown");
        const progressBar = document.getElementById("progressBar");
        const timerDisplay = document.getElementById("timerDisplay");

        countdownEl.textContent = `${Math.floor(timeRemaining / 60)}:${(timeRemaining % 60).toString().padStart(2, "0")}`;
        progressBar.style.width = "100%";
        timerDisplay.classList.remove("danger");

        reservationTimer = setInterval(() => {
            timeRemaining--;

            const minutes = Math.floor(timeRemaining / 60);
            const secondsLeft = timeRemaining % 60;
            countdownEl.textContent = `${minutes}:${secondsLeft.toString().padStart(2, "0")}`;

            const percentage = (timeRemaining / totalTime) * 100;
            progressBar.style.width = percentage + "%";

            if (timeRemaining === 600) {
                timerDisplay.classList.add("danger");
                alert("⚠️ Warning: Only 10 minutes remaining!");
            }

            if (timeRemaining <= 0) {
                clearInterval(reservationTimer);
                const penalty = parseFloat(document.getElementById("reservationFee").textContent) * 0.3;
                alert(`❌ Time Expired!\n\nReservation cancelled.\nPenalty fee: ₹${penalty.toFixed(0)}\n\nSpot has been released.`);
                endReservation(false);
            }
        }, 1000);
    }

    function rebookReservation() {
        if (!activeReservation) {
            alert("No active reservation to rebook.");
            return;
        }

        if (!confirm("Rebook will release your current spot and let you choose a new one. Continue?")) {
            return;
        }

        clearInterval(reservationTimer);
        endReservation(true);

        if (lastSearchLocation) {
            document.getElementById("locationInput").value = lastSearchLocation;
            displayParkingLocations();
            document.getElementById("parkingResults").classList.add("active");
            document.getElementById("parkingResults").scrollIntoView({ behavior: "smooth" });
        }

        alert("Your current reservation has been released. You can now choose a new parking spot.");
    }

    function cancelReservation() {
        if (!activeReservation) {
            alert("No active reservation to cancel.");
            return;
        }

        if (!confirm("Cancel reservation? Refund depends on timing.")) {
            return;
        }

        clearInterval(reservationTimer);
        const fee = parseFloat(document.getElementById("reservationFee").textContent);
        const refund = fee * 0.7;

        alert(`✓ Reservation cancelled.\n\nRefund: ₹${refund.toFixed(0)}`);
        endReservation(true);
    }

    function simulateArrival() {
        if (!activeReservation) {
            alert("No active reservation found.");
            return;
        }

        clearInterval(reservationTimer);
        const location = document.getElementById("selectedLocation").textContent;
        document.getElementById("successLocation").textContent = location;

        endReservation(false);

        document.getElementById("timerDisplay").style.display = "none";
        document.getElementById("successMessage").classList.add("active");
        document.getElementById("successMessage").scrollIntoView({ behavior: "smooth" });
    }

    function endReservation(keepSearchVisible) {
        activeReservation = null;
        updateActiveReservationPanel();

        document.getElementById("timerDisplay").classList.remove("active", "danger");
        document.getElementById("progressBar").style.width = "100%";

        if (keepSearchVisible) {
            document.getElementById("parkingResults").classList.add("active");
        } else {
            document.getElementById("parkingResults").classList.remove("active");
        }
    }

    function toggleFAQ(element) {
        element.classList.toggle("active");
    }

    function openModal(modalId) {
        document.getElementById(modalId).classList.add("active");
        document.body.style.overflow = "hidden";
    }

    function closeModal(modalId) {
        document.getElementById(modalId).classList.remove("active");
        document.body.style.overflow = "auto";
    }

    document.querySelectorAll(".modal").forEach(modal => {
        modal.addEventListener("click", (e) => {
            if (e.target === modal) {
                closeModal(modal.id);
            }
        });
    });

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener("click", function (e) {
            e.preventDefault();
            const target = document.querySelector(this.getAttribute("href"));
            if (target) {
                target.scrollIntoView({ behavior: "smooth" });
            }
        });
    });
</script>
